<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ brand }} | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --scarlet:#ff2a5f; --scarlet-dark:#d11f49; }
        body {
            font-family:'Outfit',sans-serif; background:#0f111a; color:#f8f9fa;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            overflow:hidden; position:relative;
        }
        .bg-glow { position:absolute; width:600px; height:600px; border-radius:50%; filter:blur(60px); z-index:0; }
        .glow-1 { background:radial-gradient(circle,rgba(255,42,95,.18),transparent 70%); top:-200px; right:-150px; }
        .glow-2 { background:radial-gradient(circle,rgba(42,130,255,.12),transparent 70%); bottom:-200px; left:-150px; }
        .login-card {
            position:relative; z-index:1; width:380px; max-width:92vw;
            background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
            border-radius:20px; backdrop-filter:blur(14px); padding:2.5rem 2rem;
            box-shadow:0 20px 50px rgba(0,0,0,.5);
        }
        .brand-badge {
            width:64px; height:64px; border-radius:18px; margin:0 auto 1rem;
            background:linear-gradient(135deg,var(--scarlet),var(--scarlet-dark));
            display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#fff;
            box-shadow:0 8px 24px rgba(255,42,95,.45);
        }
        .form-control {
            background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:#fff;
        }
        .form-control:focus { background:rgba(255,255,255,.08); border-color:var(--scarlet); box-shadow:0 0 0 .2rem rgba(255,42,95,.2); color:#fff; }
        .input-group-text { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:var(--scarlet); }
        .btn-scarlet {
            background:var(--scarlet); border:none; color:#fff; font-weight:600;
            transition:all .25s ease; box-shadow:0 4px 15px rgba(255,42,95,.3);
        }
        .btn-scarlet:hover { background:var(--scarlet-dark); transform:translateY(-2px); color:#fff; box-shadow:0 6px 20px rgba(255,42,95,.45); }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="login-card">
        <div class="brand-badge"><i class="fas fa-satellite-dish"></i></div>
        <h3 class="text-center fw-bold mb-1" style="letter-spacing:2px;">{{ brand }}</h3>
        <p class="text-center text-secondary mb-4" style="font-size:.85rem;">Command Center &middot; Sign in to continue</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small"><i class="fas fa-circle-exclamation me-1"></i> {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin.login') }}" method="post">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="Email" required autofocus>
            </div>
            <div class="input-group mb-4">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-scarlet w-100 py-2"><i class="fas fa-right-to-bracket me-1"></i> Sign In</button>
        </form>
    </div>

    <div style="position:absolute; bottom:1rem; width:100%; text-align:center; z-index:1;" class="text-secondary small">
        &copy; 2026. <strong>DS Consulting</strong>. All rights reserved. &middot; <span class="badge bg-danger">v1.4.8</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
