version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soc_seattle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      SECRET_KEY: dev-secret-change-me
      JWT_SECRET_KEY: dev-jwt-secret-change-me
      DATABASE_URL: postgresql://postgres:postgres@db:5432/soc_seattle
      LOG_LEVEL: DEBUG
      LOG_FORMAT: json
      CORS_ORIGINS: "*"
      FORCE_HTTPS: "false"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: >
      sh -c "flask db upgrade && python seed.py && gunicorn --bind 0.0.0.0:5000 --workers 2 --reload app:application"

volumes:
  pgdata:
