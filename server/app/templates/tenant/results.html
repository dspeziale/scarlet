{% extends "base.html" %}
{% block title %}Task Results — SOC Seattle{% endblock %}
{% block page_title %}Task Results{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header"><h5 class="mb-0"><i class="bi bi-bar-chart me-2"></i>Device Inventory</h5></div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light"><tr><th>IP</th><th>MAC</th><th>Hostname</th><th>Vendor</th><th>OS</th><th>Last Seen</th></tr></thead>
      <tbody id="device-body"><tr><td colspan="6" class="text-center py-3 text-muted">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function loadDevices() {
  const resp = await fetch('/api/v1/telemetry/devices', { headers: apiHeaders() });
  const tbody = document.getElementById('device-body');
  if (!resp.ok) return;
  const devices = await resp.json();
  tbody.innerHTML = devices.length === 0
    ? '<tr><td colspan="6" class="text-center text-muted">No devices discovered yet</td></tr>'
    : devices.map(d => `<tr>
        <td>${d.ip || '—'}</td>
        <td class="font-monospace">${d.mac || '—'}</td>
        <td>${d.hostname || '—'}</td>
        <td>${d.vendor || '—'}</td>
        <td>${d.os || '—'}</td>
        <td>${d.last_seen ? new Date(d.last_seen).toLocaleString() : '—'}</td>
      </tr>`).join('');
}
loadDevices();
</script>
{% endblock %}
