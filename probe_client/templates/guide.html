{% extends "layout.html" %}

{% block title %}{{ t('hdr.guide') }}{% endblock %}
{% block content_header %}{{ t('hdr.guide') }}{% endblock %}

{% block content %}
<style>
    .guide-section h4 { font-weight:700; border-bottom:2px solid var(--scarlet); display:inline-block; padding-bottom:.2rem; }
    .guide-card { border:none; border-radius:1rem; box-shadow:0 4px 14px rgba(0,0,0,.18); }
    .step { display:flex; gap:.8rem; margin-bottom:.7rem; }
    .step .n { flex:0 0 26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--scarlet),var(--scarlet-dark)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.8rem; }
</style>

<div class="row">
    <div class="col-lg-9 col-xl-8">
        {% include 'guide_' ~ lang ~ '.html' ignore missing with context %}
    </div>
</div>
{% endblock %}
