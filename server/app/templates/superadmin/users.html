{% extends "base.html" %}
{% block title %}Users — SuperAdmin{% endblock %}
{% block page_title %}All Users{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header"><h5 class="mb-0"><i class="bi bi-people-fill me-2"></i>All Users</h5></div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light"><tr><th>Email</th><th>Username</th><th>Tenant</th><th>Roles</th><th>Active</th><th>SuperAdmin</th></tr></thead>
      <tbody id="user-body"><tr><td colspan="6" class="text-center py-3 text-muted">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function loadUsers() {
  const resp = await fetch('/api/v1/users?limit=200', { headers: apiHeaders() });
  const tbody = document.getElementById('user-body');
  if (!resp.ok) { tbody.innerHTML = '<tr><td colspan="6" class="text-danger text-center">Not authorized</td></tr>'; return; }
  const users = await resp.json();
  tbody.innerHTML = users.map(u => `<tr>
    <td>${u.email}</td>
    <td>${u.username}</td>
    <td class="font-monospace small">${u.tenant_id ? u.tenant_id.slice(0,8)+'…' : 'Global'}</td>
    <td>${(u.roles||[]).map(r=>`<span class="badge text-bg-info me-1">${r}</span>`).join('')}</td>
    <td>${u.is_active ? '✓' : '✗'}</td>
    <td>${u.is_superadmin ? '<span class="badge text-bg-danger">SA</span>' : ''}</td>
  </tr>`).join('');
}
loadUsers();
</script>
{% endblock %}
